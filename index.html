<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome My Love 💕</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Background Animation */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .heart {
            position: absolute;
            color: #ff8fa3;
            animation: float 6s infinite linear;
            font-size: 24px;
            z-index: 1;
        }

        /* Premium Glassmorphic Card Container */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px 30px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #c9184a;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        p {
            color: #ff758f;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        /* Fancy Pulsing Start Button */
        .start-btn {
            display: inline-block;
            background-color: #ff4d6d;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            animation: pulse 2s infinite;
        }

        .start-btn:hover {
            background-color: #ff758f;
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.5);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }

        /* Intro Icon Deco */
        .main-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <!-- Floating hearts overlay -->
    <div class="hearts-bg">
        <div class="heart" style="left: 7%; animation-delay: 0s;">💖</div>
        <div class="heart" style="left: 20%; animation-delay: 2.5s; font-size: 30px;">✨</div>
        <div class="heart" style="left: 50%; animation-delay: 1.2s;">❤️</div>
        <div class="heart" style="left: 75%; animation-delay: 4s; font-size: 20px;">🌸</div>
        <div class="heart" style="left: 90%; animation-delay: 3.2s;">💕</div>
    </div>

    <!-- The Fancy Card -->
    <div class="card">
        <div class="main-icon">💝</div>
        <h1>Hey Xiao Long, I made something for you...</h1>
        <p>I have a few questions to ask you. Are you ready?</p>

        <!-- URL link targets our dynamic question route cleanly -->
        <a href="{{ url_for('question', q_id=1) }}" class="start-btn">START 💘</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Victory! 🏆💕</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .heart {
            position: absolute;
            color: #ff8fa3;
            animation: float 6s infinite linear;
            font-size: 24px;
            z-index: 1;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 20px;
            animation: confetti-fall 4s infinite linear;
            z-index: 2;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px 30px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            z-index: 10;
        }

        .trophy-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: celebrate 1s infinite alternate ease-in-out;
        }
        @keyframes celebrate {
            0% { transform: scale(1) rotate(-5deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }

        h1 {
            color: #c9184a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .love-text {
            color: #ff4d6d;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .sub-text {
            color: #ff758f;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Next Page Button */
        .next-btn {
            display: inline-block;
            background-color: #ff4d6d;
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            animation: pulse 2s infinite;
        }
        .next-btn:hover {
            background-color: #ff758f;
            transform: translateY(-2px);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }
    </style>
</head>
<body>

    <div class="hearts-bg">
        <div class="heart" style="left: 5%; animation-delay: 0s;">🎉</div>
        <div class="heart" style="left: 15%; animation-delay: 3s;">💖</div>
        <div class="heart" style="left: 45%; animation-delay: 1.5s;">❤️</div>
        <div class="heart" style="left: 70%; animation-delay: 4.5s;">✨</div>
    </div>

    <div class="confetti" style="left: 20%; background-color: #ff758f; animation-delay: 0s;"></div>
    <div class="confetti" style="left: 50%; background-color: #ff4d6d; animation-delay: 1s;"></div>
    <div class="confetti" style="left: 80%; background-color: #ffb3c1; animation-delay: 0.5s;"></div>

    <div class="card">
        <div class="trophy-icon">🥳🎉</div>
        <h1>You passed the test!</h1>
        <p class="love-text">I love you to pieces. ❤️</p>
        <p class="sub-text">Check your messages, because I probably just saw your answers! 😉📱</p>

        <!-- Click here to go to the separate letter page -->
        <a href="{{ url_for('letter') }}" class="next-btn">Open My Letter 💌</a>
    </div>

</body>
</html>
